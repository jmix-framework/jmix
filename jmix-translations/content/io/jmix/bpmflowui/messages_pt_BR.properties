io.jmix.bpmflowui.view.modeler.properties.usertask/dueDateFieldDescription=<div> \
Na propriedade <strong>dueDate</strong> você pode usar expressões que resultem em:\
<ol>\
  <li>\
    <strong>java.util.Date</strong>\
    <ul>\
      <li><code>${someDateVariable}</code></li>\
    </ul>\
  </li>\
\
  <li>\
    <strong>java.lang.String</strong> com data e hora no formato ISO 8601\
    <ul>\
      <li><code>2024-02-01T08:40:37</code></li>\
    </ul>\
  </li>\
\
  <li>\
    <strong>java.lang.String</strong> com duração no formato ISO 8601\
    <ul>\
      <li><code>PT30S</code> - em 30 segundos</li>\
      <li><code>PT20M</code> - em 20 minutos</li>\
      <li><code>PT5H</code> - em 5 horas</li>\
      <li><code>P3D</code> - em 3 dias</li>\
    </ul>\
  </li>\
</ol>\
Veja: <a href="https://www.flowable.com/open-source/docs/bpmn/ch07b-BPMN-Constructs#due-date" target="_blank">Due date</a>\
</div>

