io.jmix.businesscalendarflowui.view.calendar/cronExpressionField.helpText=<div>A expressão cron é uma sequência de seis ou sete campos, separados por espaços: segundo, minuto, hora, dia, mês, dia da semana e ano (opcionalmente). \
                O mês e o dia da semana podem ser representados pelas primeiras três letras dos seus nomes em inglês. Exemplos:\
                <ul>\
                    <li>* * * ? * SUN - todos os domingos</li>\
                    <li>* * * L * ? - último dia de cada mês</li>\
                    <li>* * * ? * 6L - última sexta-feira de cada mês</li>\
                    <li>* * * ? 9 6#3 - terceira sexta-feira de setembro</li>\
                    <li>* * * 25 12 ? - todos os Natais</li>\
                </ul>\
            </div>
