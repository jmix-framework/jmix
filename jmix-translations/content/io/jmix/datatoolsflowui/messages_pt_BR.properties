io.jmix.datatoolsflowui.view.datamodel/entityModelListView.entityFilter.tooltip.text=Um campo para inserir os nomes das entidades a serem filtradas.\n \
  O campo não diferencia maiúsculas de minúsculas. Os nomes das entidades são separados por vírgulas.\n \
  Por exemplo: Entidade1, Entidade2\n \
  Ou você pode usar expressões regulares no seguinte formato:\nregexp:\\w+\\d \n \
  A expressão regular acima retorna entidades que contêm o nome "Entity1".
