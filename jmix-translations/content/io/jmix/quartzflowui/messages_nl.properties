io.jmix.quartzflowui.view.trigger/cronExpressionHelpText=<div> Een Cron-expressie is een reeks van zes of zeven velden, gescheiden door spaties: seconde, minuut, uur, dag, maand, dag van de week en jaar (optioneel). \
                    De maand en de dag van de week kunnen worden weergegeven door de eerste drie letters van hun Engelse naam. Voorbeelden:\
                    <ul>\
                        <li>0 0/5 * * * ? - wordt elke 5 minuten uitgevoerd</li>\
                        <li>0 0 0 * * ? - wordt elke dag om 00:00 uitgevoerd</li>\
                        <li>0 0 8-10 * * ? - wordt elke dag om 8, 9 en 10 uur uitgevoerd</li>\
                        <li>0 0/30 8-10 * * ? - wordt elke dag om 8:00, 8:30, 9:00, 9:30 en 10:00 uur uitgevoerd</li>\
                        <li>0 10,44 14 ? 3 WED - wordt om 14:10 en 14:44 uur uitgevoerd op elke woensdag in maart</li>\
                        <li>0 15 10 ? * 6#3 - wordt om 10:15 uur uitgevoerd op de derde vrijdag van elke maand</li>\
                        <li>0 11 11 11 11 ? - wordt elke 11 november om 11:11 uur uitgevoerd</li>\
                        <li>0 0 0 25 12 ? - wordt elke kerstmis om middernacht uitgevoerd</li>\
                    </ul>\
                </div>
io.jmix.quartzflowui.view.trigger/triggerRepeatMode=Herhalingsmodus
io.jmix.quartzflowui.view.trigger/triggerRepeatModeHelpText=<div>De herhalingsmodus bepaalt hoe vaak een trigger kan worden uitgevoerd:\
                <ul>\
                    <li>Eenmaal uitvoeren - trigger wordt eenmaal uitgevoerd, zonder herhaling</li>\
                    <li>Eindig aantal herhalingen - trigger wordt 'Aantal herhalingen' + 1 (initieel) keer uitgevoerd, elke 'Herhalingsinterval' ms</li>\
                    <li>Oneindig uitvoeren - trigger wordt oneindig uitgevoerd, elke 'Herhalingsinterval' ms</li>\
                </ul>\
                De modi 'Eindig aantal herhalingen' en 'Oneindig uitvoeren' worden begrensd door de einddatum (indien aanwezig).\
            </div>
io.jmix.quartzflowui.view.trigger/triggerMisfireInstructionHelpText=<div>De Misfire-instructie bepaalt het gedrag wanneer een misfire van een trigger wordt gedetecteerd. Er zijn twee typen planningen: eenvoudige planning en Cron-planning.\
            <p>Eenvoudige planning:\
            <ul>\
                 <li><b>Smart policy</b> - hangt af van het 'aantal herhalingen':\
                     <ul>\
                         <li>Zonder herhalingen gedraagt het zich als <b>'Nu uitvoeren'</b></li>\
                         <li>Met een eindig aantal herhalingen gedraagt het zich als <b>'Nu herplannen met bestaande herhalingsteller'</b></li>\
                         <li>Met oneindige herhalingen gedraagt het zich als <b>'Volgende herplannen met resterende herhalingsteller'</b></li>\
                     </ul>\
                 </li>\
                 <li><b>Misfires negeren</b> - alle gemiste uitvoeringen worden direct een voor een uitgevoerd. Vervolgens keert de trigger terug naar de planning</li>\
                 <li><b>Nu uitvoeren</b> - voert direct de eerste gemiste uitvoering uit. Let op: deze instructie mag alleen worden gebruikt met een eenmalige trigger (zonder herhalingen). Anders gedraagt het zich als <b>'Nu herplannen met resterende herhalingsteller'</b></li>\
                 <li><b>Volgende herplannen met bestaande herhalingsteller</b> - de scheduler doet direct niets en keert terug naar de planning. Alle gemiste uitvoeringen worden later volgens de planning uitgevoerd (misfires worden naar de toekomst 'verschoven')</li>\
                 <li><b>Volgende herplannen met resterende herhalingsteller</b> - de scheduler verwerpt gemiste uitvoeringen en keert terug naar de planning. Gemiste uitvoeringen gaan verloren (het totale aantal uitvoeringen wordt minder dan geconfigureerd indien deze beperkt zijn)</li>\
                 <li><b>Nu herplannen met bestaande herhalingsteller</b> - de scheduler voert direct de eerste gemiste uitvoering uit. De overige gemiste uitvoeringen worden later volgens de planning uitgevoerd (misfires worden naar de toekomst 'verschoven')</li>\
                 <li><b>Nu herplannen met resterende herhalingsteller</b> - de scheduler voert direct de eerste gemiste uitvoering uit en keert terug naar de planning. De resterende gemiste uitvoeringen worden verworpen.</li>\
            </ul>\
            <p>Cron-planning:\
            <ul>\
                 <li><b>Smart policy</b> - gedraagt zich op dit moment als <b>'Uitvoeren en doorgaan'</b></li>\
                 <li><b>Misfires negeren</b> - alle gemiste uitvoeringen worden direct een voor een uitgevoerd. Vervolgens keert de trigger terug naar de planning</li>\
                 <li><b>Uitvoeren en doorgaan</b> - de scheduler voert direct de eerste gemiste uitvoering uit en verwerpt de overige. Vervolgens keert hij terug naar de planning</li>\
                 <li><b>Niets doen</b> - alle gemiste uitvoeringen worden verworpen en de trigger keert eenvoudigweg terug naar de planning</li>\
            </ul>\
        </div>
io.jmix.quartzflowui.view.trigger/repeatCountHelpText=<div>Bepaalt het aantal extra uitvoeringen naast de eerste \
                (het totale aantal uitvoeringen wordt 'Aantal herhalingen' + 1).</div>
