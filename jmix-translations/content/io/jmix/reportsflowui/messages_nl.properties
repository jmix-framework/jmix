  <br/>De {E}-placeholder moet worden gebruikt als alias van de entiteit die wordt opgehaald. Bij uitvoering van de query wordt deze vervangen door een echte alias, opgegeven in de query.\
  <br/>\
  <br/>Bijvoorbeeld:\
  <br/><code>{E}.salary > 1000 and {E}.department = 'abc'</code>\
  </div>

