io.jmix.reportsflowui.view.template/outputNamePatternField.helpIcon.dialog.header=Uitvoernaam patroon
io.jmix.reportsflowui.view.template/outputNamePatternField.helpIcon.dialog.content=\
  <div>\
  Optioneel bestandsnaampatroon dat zal worden gebruikt voor de download van het geproduceerde rapport. \
  Het kan een constante string zijn of een rapportparameter als variabele bevatten, bijvoorbeeld: \
  <br/>\
  <br/><code>${header.authorName}.xlsx</code>\
  <br/>\
  <br/>Meer geavanceerde patronen met meerdere parameters en string-aaneenschakeling kunnen ook \
  worden aangemaakt als een script in een willekeurige band van de rapportstructuur, bijvoorbeeld: \
  <br/>\
  <br/><code>${Root.title}.xlsx</code>\
  <br/>\
  <br/>waarbij <code>title</code> het resultaat is van het script: \
  <br/>\
