io.jmix.reportsflowui.view.report/parametersTab.validationFieldHelp.header=Validatiescript
io.jmix.reportsflowui.view.report/parametersTab.validationFieldHelp.text=<div>Hier kunt u een Groovy-script instellen dat de waarde van de rapportparameter zal controleren.\
  <br/> De methode <code>showErrorMessage(String str)</code> kan worden gebruikt om berichten over de validatiefouten van het rapport naar de gebruiker te sturen.\
  <br/> Het script moet de parameterwaarde controleren en de "showErrorMessage()" methode aanroepen als de waarde niet geldig is.\
  <br/>\
  <br/> Bijvoorbeeld, <code>showErrorMessage('Incorrect parameter')</code> komt overeen met het bericht dat wordt verzonden in geval van een ongeldige parameter voor de rapportuitvoering.\
  <br/>\
  De volgende variabelen worden aan het script doorgegeven:\
  <ul>\
  <li><code>value</code> - de parameterwaarde ingevoerd door de gebruiker</li>\
  <li><code>dataManager</code> - een object van het type <code>DataManager</code> dat CRUD-functionaliteit biedt</li>\
  <li><code>metadata</code> - een object van het type <code>Metadata</code> dat toegang biedt tot de applicatie-metadata</li>\
  <li><code>currentAuthentication</code> - een object van het type <code>CurrentAuthentication</code> dat is gekoppeld aan de momenteel\
  <br>geauthenticeerde gebruiker</li>\
  <li><code>applicationContext</code> - een object van het type <code>ApplicationContext</code> dat toegang biedt tot beheerde beans</li>\
  <li><code>showErrorMessage</code> - methode die de validatie effectief laat falen indien aangeroepen vanuit het script</li>\
  </ul>\
  </div>

